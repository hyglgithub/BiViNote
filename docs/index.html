<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiViNote - B站视频字幕笔记神器</title>
  <style>
    /* 全局重置 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #333;
      background: #fff;
      line-height: 1.6;
    }
    a { color: #00A1D6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; height: auto; }

    /* 导航栏 */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #eee;
    }
    .nav-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #333;
      font-weight: 600;
      font-size: 18px;
    }
    .nav-brand:hover { text-decoration: none; }
    .nav-logo { font-size: 24px; }
    .nav-github {
      padding: 6px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      color: #333;
      transition: all 0.2s;
    }
    .nav-github:hover {
      background: #f5f5f5;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- 导航栏 -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-brand">
        <span class="nav-logo">📝</span>
        <span class="nav-title">BiViNote</span>
      </a>
      <a href="https://github.com/hyglgithub/BiViNote" target="_blank" class="nav-github">
        ⭐ GitHub
      </a>
    </div>
  </nav>

  <!-- Hero 区占位 -->
  <section id="hero"></section>

  <!-- 功能演示区占位 -->
  <section id="demo"></section>

  <!-- 使用教程区占位 -->
  <section id="tutorial"></section>

  <!-- 页脚占位 -->
  <footer id="footer"></footer>

</body>
</html>
